# ~/.config/alacritty/alacritty.toml

[env]
TERM = "xterm-256color"

[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
decorations = "buttonless"   # keep native traffic-light/close controls but no title bar clutter
                             # use "none" if aerospace manages all chrome and you want zero decoration
opacity = 1.0

[scrolling]
history = 5000
multiplier = 3

[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Italic"

# --- Colors: Gruvbox Dark ---
[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.cursor]
text = "#282828"
cursor = "#ebdbb2"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[cursor]
style = { shape = "Block", blinking = "Off" }
vi_mode_style = { shape = "Block", blinking = "Off" }

[mouse]
hide_when_typing = true

[terminal]
osc52 = "CopyPaste"   # lets remote (SSH) sessions write to your LOCAL clipboard via OSC52

[keyboard]
bindings = [
  { key = "K", mods = "Command", action = "ClearHistory" },
  { key = "F", mods = "Command", action = "SearchForward" },
  { key = "B", mods = "Command", action = "SearchBackward" },

  { key = "Equals", mods = "Command", action = "IncreaseFontSize" },
  { key = "Minus",  mods = "Command", action = "DecreaseFontSize" },
  { key = "Key0",   mods = "Command", action = "ResetFontSize" },
]

[general]
live_config_reload = true
import = []
