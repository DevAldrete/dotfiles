# ==========================
# === Core Settings ===
# ==========================

# Change prefix from 'Ctrl+B' to 'Ctrl+X'
unbind C-b
set-option -g prefix C-x
bind-key C-x send-prefix

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially after closing any of them
set -g renumber-windows on

# Increase scrollback history
set -g history-limit 10000

# Remove delay when pressing esc in Vim/Neovim
set -sg escape-time 0

# ==========================
# === Minimal Status Bar ===
# ==========================

# Transparent background for the status bar
set -g status-style bg=default,fg=white

# Left Side: Session Name in bold green
set -g status-left "#[fg=green,bold] #S #[default] "
set -g status-left-length 30

# Right Side: Completely Empty
set -g status-right ""

# Center: Window "Tabs"
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=black,bg=green,bold] #I:#W #[default]"
set -g status-justify centre

# ==========================
# === Vim/Tmux Navigation ===
# ==========================

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

# The Smart Bindings
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# The Clear Screen Fix (Press Prefix + Ctrl+l to clear screen)
bind C-l send-keys 'C-l'

# ==========================
# === Essential Plugins ===
# ==========================

# We only keep TPM for session persistence.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
